apiVersion: v1
kind: Service
metadata:
  name: {{ include "tensorboards.fullname" . }}-web-app
  namespace: kubeflow
  labels:
    {{- include "tensorboards.labels" . | nindent 4 }}
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: {{ .Values.controller.service.port | quote }}
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.controller.service.port }}
      targetPort: metrics
      protocol: TCP
      name: tcp-metrics
  selector:
    {{- include "tensorboards.controllerSelectorLabels" . | nindent 4 }}
