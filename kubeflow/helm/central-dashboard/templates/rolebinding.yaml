{{- $fullName := include "central-dashboard.fullname" . -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "central-dashboard.labels" . | nindent 4 }}
  name: {{ $fullName }}
  namespace: kubeflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "central-dashboard.serviceAccountName" . }}
    namespace: kubeflow
