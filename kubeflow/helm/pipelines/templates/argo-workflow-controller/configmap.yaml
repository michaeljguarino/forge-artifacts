apiVersion: v1
data:
  artifactRepository: |
    archiveLogs: true
    s3:
      bucket: <<__s3.bucket.pipelines__>>
      keyPrefix: <<__s3.key_prefix.pipelines__>>
      endpoint: s3.amazonaws.com
      region: <<__aws_region__>>
      insecure: false
      accessKeySecret:
        name: pipelines-s3-secret
        key: S3_ACCESSKEY
      secretKeySecret:
        name: pipelines-s3-secret
        key: S3_SECRETKEY
  containerRuntimeExecutor: pns
  executor: |
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 0.01
        memory: 32Mi
      limits:
        cpu: 0.5
        memory: 512Mi
kind: ConfigMap
metadata:
  labels: {{- include "pipelines.labels" . | nindent 4 }}
  name: {{ include "pipelines.fullname" . }}-argo-workflow-controller
  namespace: kubeflow
